<script>
let trackingPhone="";
let trackingTimer=null;

function toggleChat(){
  const box=document.getElementById("chatBox");
  box.style.display=box.style.display==="block"?"none":"block";
}

function sendChat(){
  const input=document.getElementById("chatInput");
  const messages=document.getElementById("chatMessages");
  const text=input.value.trim();

  if(!text)return;

  messages.innerHTML+=`<p><b>You:</b> ${text}</p>`;

  let reply="Thank you! Please send your order on WhatsApp for confirmation.";

  if(text.toLowerCase().includes("menu")){
    reply="Our menu includes burgers, broast chicken, biryani, pulao, potato and cola.";
  }

  if(text.toLowerCase().includes("order")){
    reply="Please tell us item name and quantity.";
  }

  if(text.toLowerCase().includes("open")){
    reply="Opening June 30.";
  }

  messages.innerHTML+=`<p><b>AI:</b> ${reply}</p>`;

  input.value="";
  messages.scrollTop=messages.scrollHeight;
}

function sendDeliveryOrder(){

  const name=document.getElementById("name").value;
  const phone=document.getElementById("phone").value;
  const order=document.getElementById("order").value;
  const type=document.getElementById("type").value;
  const address=document.getElementById("address").value;

  if(!name || !phone || !order){
    alert("Please fill all required fields.");
    return;
  }

  fetch("https://n8n.sakurajapanbot.tech/webhook/delivery-order",{
    method:"POST",
    mode:"no-cors",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      name:name,
      phone:phone,
      order:order,
      type:type,
      address:address
    })
  })

  .then(()=>{
    alert("✅ Order Sent Successfully!");
  })

  .catch((error)=>{
    console.log(error);
    alert("❌ Order Failed. Please try again.");
  });

}

async function trackOrder(){

  trackingPhone=document.getElementById("trackPhone").value;

  const phone=trackingPhone;

  const result=document.getElementById("trackingResult");

  const progressContainer=document.getElementById("progressContainer");

  const progress=document.getElementById("progressFill");

  if(!phone){
    result.innerHTML="❌ Please enter phone number.";
    progressContainer.style.display="none";
    return;
  }

  result.innerHTML="⏳ Checking your order...";
  progressContainer.style.display="none";

  try{

    const response=await fetch(
      "https://n8n.sakurajapanbot.tech/webhook/track-order",
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify({phone})
      }
    );

    const data=await response.json();

    const order=Array.isArray(data)
      ? data[0]
      : data;

    if(!order || !order.order_id){

      result.innerHTML="❌ Order not found.";

      progressContainer.style.display="none";

      return;
    }

    progressContainer.style.display="block";

    if(order.status==="Preparing"){
      progress.style.width="25%";
    }

    else if(order.status==="Ready"){
      progress.style.width="50%";
    }

    else if(order.status==="On The Way"){
      progress.style.width="75%";
    }

    else if(order.status==="Delivered"){
      progress.style.width="100%";
    }

    else{
      progress.style.width="25%";
    }

    result.innerHTML=`

    <div class="status-card">

      <div class="status-title">
        📦 ${order.status}
      </div>

      ✅ Order Found<br><br>

      🆔 Order ID:
      ${order.order_id}<br>

      🍔 Order:
      ${order.order}<br>

      🛵 Type:
      ${order.type}<br>

      💴 Delivery Fee:
      ¥${order.delivery_fee}<br>

      📍 Address:
      ${order.address}<br>

      👨‍✈️ Driver:
      ${order.driver_name}<br>

      📞 Driver Phone:
      ${order.driver_phone}<br>

      🛵 Driver Status:
      ${order.driver_status}<br>

      ⏱ Estimated Time:
      ${order.estimated_time || "Checking"}<br>

      📝 Note:
      ${order.tracking_note || "Order received"}

    </div>
    `;

    if(trackingTimer){
      clearInterval(trackingTimer);
    }

    trackingTimer=setInterval(function(){
      trackOrder();
    },10000);

  }

  catch(error){

    console.log(error);

    result.innerHTML=
    "❌ Order not found or tracking system is not ready.";

    progressContainer.style.display="none";
  }
}
</script>
