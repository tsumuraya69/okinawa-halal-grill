<script>

async function sendOrder(){

const name =
document.getElementById("name").value;

const phone =
document.getElementById("phone").value;

const order =
document.getElementById("order").value;

const type =
document.getElementById("type").value;

const address =
document.getElementById("address").value;

let delivery_fee = 0;

if(type === "Delivery"){
delivery_fee = 300;
}

try{

const response = await fetch(
"https://n8n.sakurajapanbot.tech/webhook/delivery-order",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
name:name,
phone:phone,
order:order,
type:type,
delivery_fee:delivery_fee,
address:address,
status:"Preparing"
})
}
);

console.log(await response.text());

alert("✅ Order Sent Successfully!");

}catch(error){

console.log(error);

alert("❌ Order Failed. Try again.");

}

}

async function trackOrder(){

const phone =
document.getElementById("trackPhone").value.trim();

const result =
document.getElementById("trackingResult");

result.innerHTML =
"Checking order...";

try {

const response = await fetch(
"https://n8n.sakurajapanbot.tech/webhook/track-order",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
phone:phone
})
}
);

const data = await response.json();

console.log(data);

if(!data.success){

result.innerHTML =
"❌ Order not found.";

return;

}

result.innerHTML = `
<div style="color:#00ff88;font-size:28px;font-weight:bold;">
✅ ${data.status}
</div>

<div style="margin-top:10px;color:white;font-size:22px;">
⏱️ Estimated Time:
${data.estimated_time || "30 min"}
</div>

<div style="margin-top:10px;color:gold;font-size:22px;">
📦 ${data.tracking_note || "Preparing"}
</div>
`;

}catch(error){

console.log(error);

result.innerHTML =
"❌ Tracking system not ready.";

}

}

</script>
